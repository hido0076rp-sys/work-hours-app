<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0D0F14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>稼働時間管理</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='512' height='512' viewBox='0 0 72 72' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='dg1l' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2313161E'/%3E%3Cstop offset='100%25' stop-color='%231C2030'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='72' height='72' rx='18' fill='url(%23dg1l)'/%3E%3Ccircle cx='36' cy='40' r='30' fill='none' stroke='%236C8EFF' stroke-width='0.5' stroke-opacity='0.25'/%3E%3Ccircle cx='36' cy='40' r='26' fill='%23252A3A'/%3E%3Cline x1='36' y1='11' x2='36' y2='15' stroke='%236C8EFF' stroke-width='2' stroke-linecap='round' stroke-opacity='0.9'/%3E%3Cline x1='36' y1='65' x2='36' y2='69' stroke='%234A5168' stroke-width='1.5' stroke-linecap='round' stroke-opacity='0.6'/%3E%3Cline x1='7' y1='40' x2='11' y2='40' stroke='%234A5168' stroke-width='1.5' stroke-linecap='round' stroke-opacity='0.6'/%3E%3Cline x1='61' y1='40' x2='65' y2='40' stroke='%236C8EFF' stroke-width='2' stroke-linecap='round' stroke-opacity='0.9'/%3E%3Cline x1='58.5' y1='22.5' x2='56.5' y2='24.8' stroke='%234A5168' stroke-width='1' stroke-linecap='round' stroke-opacity='0.5'/%3E%3Cline x1='13.5' y1='22.5' x2='15.5' y2='24.8' stroke='%234A5168' stroke-width='1' stroke-linecap='round' stroke-opacity='0.5'/%3E%3Cline x1='58.5' y1='57.5' x2='56.5' y2='55.2' stroke='%234A5168' stroke-width='1' stroke-linecap='round' stroke-opacity='0.5'/%3E%3Cline x1='13.5' y1='57.5' x2='15.5' y2='55.2' stroke='%234A5168' stroke-width='1' stroke-linecap='round' stroke-opacity='0.5'/%3E%3Cline x1='36' y1='40' x2='36' y2='22' stroke='%236C8EFF' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='36' y1='40' x2='48' y2='47' stroke='%23A78BFA' stroke-width='2' stroke-linecap='round'/%3E%3Ccircle cx='36' cy='40' r='3.5' fill='%236C8EFF'/%3E%3Crect x='34.5' y='7' width='3' height='3' rx='1.5' fill='%236C8EFF'/%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif; }
    :root {
      --bg0: #0D0F14;
      --bg1: #13161E;
      --bg2: #1C2030;
      --bg3: #252A3A;
      --accent: #6C8EFF;
      --accent2: #A78BFA;
      --accent3: #34D399;
      --accent4: #FB923C;
      --text1: #E8ECF4;
      --text2: #8891A8;
      --text3: #4A5168;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(108,142,255,0.25);
      --danger: #F87171;
      --radius: 16px;
    }
    body { background: var(--bg0); color: var(--text1); min-height: 100vh; padding-bottom: 80px; }

    /* Header */
    .header {
      background: var(--bg0);
      padding: 28px 20px 0;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,142,255,0.08) 0%, transparent 70%);
      top: -60px; right: -40px;
    }
    .header::after {
      content: ''; position: absolute; width: 120px; height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.06) 0%, transparent 70%);
      bottom: -30px; left: -20px;
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; position: relative; z-index: 1;
    }
    .app-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px; font-weight: 500;
      color: var(--text3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .month-nav {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      position: relative; z-index: 1;
    }
    .nav-btn {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--bg3); border: 1px solid var(--border);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--text2);
      transition: all 0.15s;
    }
    .nav-btn:hover { background: var(--bg2); color: var(--text1); border-color: var(--border2); }
    .month-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px; font-weight: 700; color: var(--text1);
      position: relative; z-index: 1;
    }
    .month-label .year { color: var(--accent); }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 14px 14px 14px; background: var(--bg0); }
    .stat-card {
      background: var(--bg2); border-radius: var(--radius); padding: 14px;
      border: 1px solid var(--border); position: relative; overflow: hidden;
    }
    .stat-card::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      border-radius: 0 0 16px 16px;
    }
    .stat-card.peach::after { background: var(--accent); }
    .stat-card.mint::after { background: var(--accent3); }
    .stat-card.lavender::after { background: var(--accent2); }
    .stat-card.lemon::after { background: var(--accent4); }
    .stat-icon { font-size: 16px; margin-bottom: 4px; display: none; }
    .stat-label { font-size: 10px; font-weight: 400; color: var(--text3); letter-spacing: 0.06em; margin-bottom: 6px; }
    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px; font-weight: 700; line-height: 1;
    }
    .stat-unit { font-size: 12px; font-weight: 400; margin-left: 2px; }
    .stat-card.peach .stat-value { color: #8BAEFF; }
    .stat-card.peach .stat-unit { color: var(--text2); }
    .stat-card.mint .stat-value { color: #5CE8B5; }
    .stat-card.mint .stat-unit { color: var(--text2); }
    .stat-card.lavender .stat-value { color: #BBA8FF; }
    .stat-card.lavender .stat-unit { color: var(--text2); }
    .stat-card.lemon .stat-value { color: #FDB07A; }
    .stat-card.lemon .stat-unit { color: var(--text2); }

    .section-label {
      font-size: 10px; font-weight: 500; color: var(--text3);
      letter-spacing: 0.1em; padding: 16px 18px 10px;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
    }

    /* Day list */
    .day-list { padding: 0 14px; display: flex; flex-direction: column; gap: 6px; padding-bottom: 16px; }
    .day-card {
      background: var(--bg1); border-radius: 14px; padding: 13px 15px;
      display: flex; align-items: center; border: 1px solid var(--border);
      cursor: pointer; transition: all 0.15s;
    }
    .day-card:hover { background: var(--bg2); border-color: var(--border2); }
    .day-card:active { transform: translateX(3px); }
    .day-card.today { background: var(--bg2); border-color: rgba(108,142,255,0.3); }
    .day-card.has-work { border-color: rgba(52,211,153,0.2); }
    .day-dot {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-right: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 700;
    }
    .day-dot.today-dot { background: var(--accent); color: white; }
    .day-dot:not(.today-dot) { background: var(--bg3); color: var(--text2); }
    .day-info { flex: 1; }
    .day-title { font-size: 14px; font-weight: 500; color: var(--text1); }
    .day-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .day-hours {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; font-weight: 500; color: var(--text3);
    }
    .day-hours.worked { color: var(--accent3); }
    .today-badge {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); margin-left: 8px;
      display: inline-block; vertical-align: middle;
    }

    /* Multi-slot */
    .day-card-multi {
      background: var(--bg1); border-radius: 14px; padding: 13px 15px;
      border: 1px solid rgba(52,211,153,0.2); cursor: pointer; transition: all 0.15s;
    }
    .day-card-multi:hover { background: var(--bg2); border-color: var(--border2); }
    .day-card-multi:active { transform: translateX(3px); }
    .day-card-multi .multi-header { display: flex; align-items: center; margin-bottom: 6px; }
    .day-card-multi .slot-row { display: flex; justify-content: space-between; padding: 3px 0 3px 48px; font-size: 12px; color: var(--text2); }

    /* FAB */
    .fab {
      position: fixed; bottom: 88px; right: 20px;
      width: 52px; height: 52px; border-radius: 16px;
      background: var(--accent);
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px rgba(108,142,255,0.4);
      font-size: 22px; font-weight: 300; color: white; z-index: 90;
      transition: all 0.2s;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 0 28px rgba(108,142,255,0.6); }
    .fab:active { transform: scale(0.95); }

    /* Bottom nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: 68px;
      background: var(--bg1);
      border-top: 1px solid var(--border); display: flex;
      align-items: center; justify-content: space-around; padding: 0 8px 8px; z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 18px; border-radius: 12px; cursor: pointer; border: none; background: none;
      transition: background 0.15s;
    }
    .nav-item:hover { background: var(--bg3); }
    .nav-item.active { background: rgba(108,142,255,0.12); }
    .nav-icon { font-size: 16px; }
    .nav-label { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 0.04em; }
    .nav-item.active .nav-label { color: var(--accent); }
    .nav-item.active .nav-icon { filter: drop-shadow(0 0 4px rgba(108,142,255,0.6)); }

    /* Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--bg1); border-radius: 28px 28px 0 0; padding: 24px 20px 32px;
      width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
      border: 1px solid var(--border); border-bottom: none;
    }
    .modal h2 { font-size: 18px; font-weight: 700; color: var(--text1); margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 0.04em; margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select {
      padding: 12px; border: 1px solid var(--border); border-radius: 12px;
      font-size: 16px; outline: none; background: var(--bg2); font-family: inherit;
      color: var(--text1);
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,142,255,0.15);
    }
    .form-group input, .form-group textarea { width: 100%; }
    .form-group textarea { resize: vertical; min-height: 50px; }
    .time-picker-row { display: flex; align-items: center; gap: 6px; }
    .time-picker-row select {
      flex: 1; padding: 12px 4px; font-size: 18px; text-align: center;
      border: 1px solid var(--border); border-radius: 12px; background: var(--bg2);
      outline: none; appearance: none; -webkit-appearance: none; font-family: inherit;
      color: var(--text1);
    }
    .time-picker-row select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,142,255,0.15); }
    .time-picker-row .colon { font-size: 20px; font-weight: bold; color: var(--text3); }
    .btn-now {
      padding: 10px 12px; background: var(--accent);
      color: white; border: none; border-radius: 12px; font-size: 13px;
      font-weight: 700; cursor: pointer; white-space: nowrap; font-family: inherit;
    }
    .btn-now:active { opacity: 0.8; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions button {
      flex: 1; padding: 14px; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .btn-cancel { background: var(--bg3); color: var(--text2); }
    .btn-save { background: var(--accent); color: white; }
    .btn-save:active { opacity: 0.85; }
    .btn-delete-full {
      width: 100%; padding: 12px; border: 1px solid var(--danger); border-radius: 14px;
      font-size: 13px; cursor: pointer; background: transparent; color: var(--danger);
      font-weight: 700; margin-top: 12px; font-family: inherit;
    }

    /* Pages */
    .page { display: none; }
    .page.active { display: block; }

    /* Rate page */
    .rate-page { padding: 16px; }
    .rate-section {
      background: var(--bg2); border-radius: var(--radius); padding: 16px;
      margin-bottom: 12px; border: 1px solid var(--border); overflow: hidden;
    }
    .rate-section h3 { font-size: 13px; color: var(--text3); margin-bottom: 12px; font-weight: 700; letter-spacing: 0.04em; }
    .income-row {
      display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
    }
    .income-row label { font-size: 13px; font-weight: 700; min-width: 40px; color: var(--text2); }
    .income-row input {
      flex: 1; min-width: 0; padding: 10px; border: 1px solid var(--border); border-radius: 12px;
      font-size: 15px; outline: none; text-align: right; font-family: inherit;
      background: var(--bg3); color: var(--text1);
    }
    .income-row input:focus { border-color: var(--accent); }
    .income-row .unit { font-size: 13px; color: var(--text3); }
    .rate-result {
      text-align: center; padding: 20px;
      background: linear-gradient(135deg, rgba(108,142,255,0.15), rgba(167,139,250,0.15));
      border-radius: var(--radius);
    }
    .rate-result .rate-label { font-size: 13px; color: var(--text2); }
    .rate-result .rate-value { font-size: 34px; font-weight: 700; color: #8BAEFF; margin-top: 4px; font-family: 'Space Grotesk', sans-serif; }
    .year-selector {
      display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 12px;
    }
    .year-selector button {
      background: var(--bg3); border: 1px solid var(--border);
      width: 32px; height: 32px; border-radius: 50%; font-size: 14px; cursor: pointer;
      color: var(--text2);
    }
    .year-selector .year-label { font-size: 16px; font-weight: 700; color: var(--text1); }
    .year-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .year-table th { text-align: left; padding: 6px 4px; border-bottom: 1px solid var(--bg3); font-size: 10px; color: var(--text3); font-weight: 700; }
    .year-table td { padding: 7px 4px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--text2); }
    .year-table tr:last-child td { border-bottom: none; font-weight: 700; color: var(--text1); }
    .year-table .num { text-align: right; }

    /* Settings */
    .settings-page { padding: 16px; }
    .settings-section {
      background: var(--bg2); border-radius: var(--radius); padding: 16px;
      margin-bottom: 12px; border: 1px solid var(--border);
    }
    .settings-section h3 { font-size: 13px; margin-bottom: 12px; font-weight: 700; color: var(--text1); }
    .settings-btn {
      width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 14px;
      background: var(--bg3); font-size: 13px; cursor: pointer; margin-bottom: 8px;
      text-align: left; font-family: inherit; font-weight: 500; color: var(--text1);
      transition: all 0.15s;
    }
    .settings-btn:active { background: var(--bg2); }
    .settings-btn.danger { color: var(--danger); border-color: rgba(248,113,113,0.3); }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <span class="app-title">勤務ログ</span>
    </div>
    <div class="month-nav" id="monthNav">
      <button class="nav-btn" onclick="prevMonth()">◀</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" onclick="nextMonth()">▶</button>
    </div>
    <div class="stats-grid" id="monthlySummary"></div>
  </div>

  <div class="page active" id="page-monthly">
    <div class="section-label" id="sectionLabel"></div>
    <div class="day-list" id="entryList"></div>
  </div>

  <div class="page" id="page-rate">
    <div class="rate-page">
      <div class="rate-section">
        <h3>月収入力</h3>
        <div id="monthlyIncomeInputs"></div>
        <div style="margin-top:12px; text-align:right; font-size:13px; color:var(--text2);">
          年収合計: <strong id="annualIncomeTotal" style="color:#8BAEFF;">¥0</strong>
        </div>
      </div>
      <div class="rate-section">
        <div class="year-selector">
          <button onclick="changeRateYear(-1)">◀</button>
          <span class="year-label" id="rateYearLabel"></span>
          <button onclick="changeRateYear(1)">▶</button>
        </div>
        <div id="yearSummaryTable"></div>
      </div>
      <div class="rate-section">
        <div class="rate-result" id="rateResult"></div>
      </div>
    </div>
  </div>

  <div class="page" id="page-settings">
    <div class="settings-page">
      <div class="settings-section">
        <h3>データ管理</h3>
        <button class="settings-btn" onclick="exportData()">📤 データをエクスポート (JSON)</button>
        <button class="settings-btn" onclick="document.getElementById('importFile').click()">📥 データをインポート</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      </div>
      <div class="settings-section">
        <button class="settings-btn danger" onclick="clearAllData()">🗑 全データを削除</button>
      </div>
      <div class="settings-section" style="text-align:center; color: var(--text3); font-size: 11px;">
        <p>稼働時間管理 v2.0</p>
        <p style="margin-top:4px;">データはこの端末のブラウザ内に保存されます</p>
        <p>サーバーへの送信は一切ありません</p>
      </div>
    </div>
  </div>

  <button class="fab" id="fab" onclick="openAddModal()">＋</button>

  <div class="bottom-nav">
    <button class="nav-item active" onclick="switchPage('monthly', this)">
      <span class="nav-icon">🗓</span><span class="nav-label">月別</span>
    </button>
    <button class="nav-item" onclick="switchPage('rate', this)">
      <span class="nav-icon">💰</span><span class="nav-label">時間単価</span>
    </button>
    <button class="nav-item" onclick="switchPage('settings', this)">
      <span class="nav-icon">⚙</span><span class="nav-label">設定</span>
    </button>
  </div>

  <div class="modal-overlay hidden" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
  </div>

  <script>
    const STORAGE_KEY = 'workHoursData';
    const INCOME_KEY = 'monthlyIncomes';
    const BULK_KEY = 'monthlyBulkHours';
    const MONTHS_EN = ['','January','February','March','April','May','June','July','August','September','October','November','December'];

    function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
    function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
    function loadIncomes() { try { return JSON.parse(localStorage.getItem(INCOME_KEY)) || {}; } catch { return {}; } }
    function saveIncomes(d) { localStorage.setItem(INCOME_KEY, JSON.stringify(d)); }
    function loadBulk() { try { return JSON.parse(localStorage.getItem(BULK_KEY)) || {}; } catch { return {}; } }
    function saveBulk(d) { localStorage.setItem(BULK_KEY, JSON.stringify(d)); }
    function getBulk(y,m) { return loadBulk()[`${y}-${String(m).padStart(2,'0')}`] || null; }
    function setBulk(y,m,v) { const d=loadBulk(); const k=`${y}-${String(m).padStart(2,'0')}`; if(v===null||v==='') delete d[k]; else d[k]=v; saveBulk(d); }

    function getMonthEntries(y,m) { return loadData()[`${y}-${String(m).padStart(2,'0')}`] || []; }
    function setMonthEntries(y,m,e) { const d=loadData(); d[`${y}-${String(m).padStart(2,'0')}`]=e; saveData(d); }

    function parseTime(t) { if(!t) return null; const [h,m]=t.split(':').map(Number); return h*60+m; }
    function calcDuration(s,e) { const a=parseTime(s),b=parseTime(e); if(a===null||b===null) return 0; let d=b-a; if(d<0) d+=1440; return d; }
    function fmtMin(m) { return `${Math.floor(m/60)}時間${m%60}分`; }
    function fmtHM(m) { return `${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`; }
    function daysIn(y,m) { return new Date(y,m,0).getDate(); }
    function dowName(y,m,d) { return ['日','月','火','水','木','金','土'][new Date(y,m-1,d).getDay()]; }
    function dowIdx(y,m,d) { return new Date(y,m-1,d).getDay(); }
    function dowClass(y,m,d) { return ['sun','mon','tue','wed','thu','fri','sat'][new Date(y,m-1,d).getDay()]; }
    function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
    function isToday(y,m,d) { const t=new Date(); return t.getFullYear()===y && t.getMonth()+1===m && t.getDate()===d; }

    function hourOpts(sel) { let h='<option value="">--</option>'; for(let i=0;i<24;i++){const v=String(i).padStart(2,'0'); h+=`<option value="${v}" ${v===sel?'selected':''}>${i}</option>`;} return h; }
    function minOpts(sel) {
      let h='<option value="">--</option>';
      const tens=[0,10,20,30,40,50];
      for(const i of tens){const v=String(i).padStart(2,'0'); h+=`<option value="${v}" ${v===sel?'selected':''}>${v}</option>`;}
      if(sel && !tens.includes(parseInt(sel))){ h+=`<option value="${sel}" selected>${sel}</option>`; }
      return h;
    }
    function getTime(p) { const h=document.getElementById(p+'H').value, m=document.getElementById(p+'M').value; return (h&&m)?`${h}:${m}`:''; }
    function setNow(p) {
      const n=new Date(), mv=String(n.getMinutes()).padStart(2,'0');
      document.getElementById(p+'H').value=String(n.getHours()).padStart(2,'0');
      const sel=document.getElementById(p+'M');
      if(![...sel.options].some(o=>o.value===mv)){ const opt=document.createElement('option'); opt.value=mv; opt.textContent=mv; sel.appendChild(opt); }
      sel.value=mv;
    }
    function timePicker(p,label,sh,sm) {
      return `<div class="form-group"><label>${label}</label>
        <div class="time-picker-row">
          <select id="${p}H">${hourOpts(sh||'')}</select><span class="colon">:</span>
          <select id="${p}M">${minOpts(sm||'')}</select>
          <button type="button" class="btn-now" onclick="setNow('${p}')">今</button>
        </div></div>`;
    }

    let curY=new Date().getFullYear(), curM=new Date().getMonth()+1, rateY=new Date().getFullYear();

    function render() {
      document.getElementById('monthLabel').innerHTML=`<span class="year">${curY}</span>年 ${curM}月`;
      document.getElementById('sectionLabel').textContent=`${MONTHS_EN[curM]} ${curY}`;
      renderSummary(); renderList();
    }
    function buildDayMap(entries) { const m={}; for(const e of entries){let t=0; for(const s of(e.slots||[]))t+=calcDuration(s.start,s.end); m[e.date]=(m[e.date]||0)+t;} return m; }

    function getMonthTotalMin(y,m) {
      const bulk=getBulk(y,m);
      if(bulk!==null){ const b=parseFloat(bulk); return Math.round(b*60); }
      const entries=getMonthEntries(y,m), dm=buildDayMap(entries);
      let total=0; for(const v of Object.values(dm)) if(v>0) total+=v;
      return total;
    }
    function getMonthWorkDays(y,m) {
      const entries=getMonthEntries(y,m), dm=buildDayMap(entries);
      let wd=0; for(const v of Object.values(dm)) if(v>0) wd++;
      return wd;
    }

    function renderSummary() {
      const days=daysIn(curY,curM), bulk=getBulk(curY,curM);
      const entries=getMonthEntries(curY,curM), dm=buildDayMap(entries);
      let total, wd;
      if(bulk!==null){
        total=Math.round(parseFloat(bulk)*60);
        wd=0; for(const v of Object.values(dm)) if(v>0) wd++;
      } else {
        total=0; wd=0;
        for(const v of Object.values(dm)){if(v>0){wd++;total+=v;}}
      }
      const avg=wd>0?Math.round(total/wd):0;
      const bulkBadge=bulk!==null?'<span style="font-size:9px;color:var(--accent4);margin-left:4px;">一括</span>':'';
      document.getElementById('monthlySummary').innerHTML=`
        <div class="stat-card peach"><div class="stat-label">合計勤務時間${bulkBadge}</div><div class="stat-value">${Math.floor(total/60)}<span class="stat-unit">時間 ${total%60}分</span></div></div>
        <div class="stat-card mint"><div class="stat-label">勤務日数</div><div class="stat-value">${wd}<span class="stat-unit">日</span></div></div>
        <div class="stat-card lavender"><div class="stat-label">平均時間 / 日</div><div class="stat-value">${Math.floor(avg/60)}<span class="stat-unit">時間 ${avg%60}分</span></div></div>
        <div class="stat-card lemon"><div class="stat-label">休日日数</div><div class="stat-value">${days-wd}<span class="stat-unit">日</span></div></div>`;
    }

    function renderList() {
      const entries=getMonthEntries(curY,curM), days=daysIn(curY,curM);
      const em={}; for(const e of entries) em[e.date]=e;
      let html='';
      for(let d=1;d<=days;d++){
        const ds=`${curY}-${String(curM).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dow=dowName(curY,curM,d), dc=dowClass(curY,curM,d), today=isToday(curY,curM,d);
        const di=dowIdx(curY,curM,d);
        const e=em[ds];
        const todayBadge=today?'<span class="today-badge"></span>':'';
        const dotClass=today?'day-dot today-dot':'day-dot';
        const isSunday=di===0;
        if(e && e.slots && e.slots.length>0){
          let tot=0; e.slots.forEach(s=>tot+=calcDuration(s.start,s.end));
          if(e.slots.length===1){
            const s=e.slots[0];
            html+=`<div class="day-card has-work ${today?'today':''}" onclick="openEditModal('${ds}')">
              <div class="${dotClass}">${d}</div>
              <div class="day-info">
                <div class="day-title">${curM}月 ${d}日 ${todayBadge}</div>
                <div class="day-sub">${dow}曜日${e.memo?' · '+esc(e.memo):''}${today?' · 今日':''}</div>
              </div>
              <div class="day-hours worked">${fmtMin(tot)}</div>
            </div>`;
          } else {
            html+=`<div class="day-card-multi" onclick="openEditModal('${ds}')">
              <div class="multi-header"><div class="${dotClass}">${d}</div>
                <div class="day-info"><div class="day-title">${curM}月 ${d}日 ${todayBadge}</div><div class="day-sub">${dow}曜日${today?' · 今日':''}</div></div>
                <div class="day-hours worked">${fmtMin(tot)}</div>
              </div>`;
            for(const s of e.slots){
              html+=`<div class="slot-row"><span>${s.start} - ${s.end}</span><span>${fmtMin(calcDuration(s.start,s.end))}</span></div>`;
            }
            if(e.memo) html+=`<div class="slot-row" style="color:var(--text3);font-style:italic;">${esc(e.memo)}</div>`;
            html+=`</div>`;
          }
        } else {
          const isHoliday = isSunday;
          html+=`<div class="day-card ${today?'today':''}" onclick="openAddModalForDate('${ds}')">
            <div class="${dotClass}">${d}</div>
            <div class="day-info">
              <div class="day-title">${curM}月 ${d}日 ${todayBadge}</div>
              <div class="day-sub">${dow}曜日${isHoliday?' · 休日':''}${today?' · 今日':''}</div>
            </div>
            <div class="day-hours"${isHoliday?' style="color:var(--danger);"':''}>
              ${isHoliday?'休':'--'}
            </div>
          </div>`;
        }
      }
      // Bulk input button
      const bulk=getBulk(curY,curM);
      html+=`<div style="padding:8px 0;">
        <button onclick="openBulkModal()" style="width:100%;padding:14px;border-radius:14px;border:1px dashed ${bulk!==null?'var(--accent4)':'var(--border2)'};background:${bulk!==null?'rgba(251,146,60,0.08)':'transparent'};color:${bulk!==null?'var(--accent4)':'var(--accent)'};font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">
          ${bulk!==null?'⏱ 一括入力済み: '+bulk+'時間（変更する）':'⏱ この月の勤務時間を一括入力'}
        </button>
      </div>`;
      document.getElementById('entryList').innerHTML=html;
    }

    function prevMonth(){curM--;if(curM<1){curM=12;curY--;}render();}
    function nextMonth(){curM++;if(curM>12){curM=1;curY++;}render();}
    function switchPage(p,btn){
      document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
      document.getElementById('page-'+p).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('fab').style.display=p==='monthly'?'flex':'none';
      document.querySelector('.header .month-nav').style.display=p==='monthly'?'flex':'none';
      if(p==='rate') renderRatePage();
    }

    function showModal(){document.getElementById('modalOverlay').classList.remove('hidden');}
    function hideModal(){document.getElementById('modalOverlay').classList.add('hidden');}
    function closeModal(ev){if(ev.target===document.getElementById('modalOverlay'))hideModal();}

    function openAddModal(){
      const today=`${curY}-${String(curM).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;
      openAddModalForDate(today);
    }
    function openAddModalForDate(ds){
      document.getElementById('modalContent').innerHTML=`
        <h2>勤務時間を追加</h2>
        <div class="form-group"><label>日付</label><input type="date" id="inputDate" value="${ds}"></div>
        ${timePicker('start','開始時刻')}${timePicker('end','終了時刻')}
        <div class="form-group"><label>メモ（任意）</label><textarea id="inputMemo" rows="2" placeholder="例：まちだ面談"></textarea></div>
        <div class="modal-actions"><button class="btn-cancel" onclick="hideModal()">キャンセル</button><button class="btn-save" onclick="saveEntry()">保存</button></div>`;
      showModal();
    }
    function openEditModal(ds){
      const entries=getMonthEntries(curY,curM), entry=entries.find(e=>e.date===ds);
      if(!entry) return openAddModalForDate(ds);
      let tot=0; entry.slots.forEach(s=>tot+=calcDuration(s.start,s.end));
      const [,mo,da]=ds.split('-').map(Number), dow=dowName(curY,mo,da);
      let slotsHtml='';
      entry.slots.forEach((s,i)=>{
        slotsHtml+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);">
          <span style="flex:1;font-size:13px;">${s.start} - ${s.end} (${fmtMin(calcDuration(s.start,s.end))})</span>
          <button onclick="deleteSlot('${ds}',${i})" style="background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;">✕</button>
        </div>`;
      });
      document.getElementById('modalContent').innerHTML=`
        <h2>${mo}/${da}(${dow})の勤務記録</h2>
        <div style="margin-bottom:12px;font-size:13px;color:var(--text2);">合計: <strong style="color:#8BAEFF;">${fmtMin(tot)}</strong></div>
        ${slotsHtml}
        ${entry.memo?`<div style="font-size:12px;color:var(--text3);margin:8px 0;font-style:italic;">メモ: ${esc(entry.memo)}</div>`:''}
        <div style="border-top:1px solid var(--border);padding-top:16px;margin-top:8px;">
          <h3 style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text1);">時間を追加</h3>
          ${timePicker('start','開始時刻')}${timePicker('end','終了時刻')}
          <div class="form-group"><label>メモ</label><textarea id="inputMemo" rows="2">${entry.memo?esc(entry.memo):''}</textarea></div>
        </div>
        <div class="modal-actions"><button class="btn-cancel" onclick="hideModal()">閉じる</button><button class="btn-save" onclick="addSlotToDate('${ds}')">追加</button></div>
        <button class="btn-delete-full" onclick="deleteDate('${ds}')">この日の記録を全て削除</button>`;
      showModal();
    }

    function saveEntry(){
      const ds=document.getElementById('inputDate').value, start=getTime('start'), end=getTime('end'), memo=document.getElementById('inputMemo').value.trim();
      if(!ds||!start||!end){alert('日付、開始時刻、終了時刻を入力してください。');return;}
      const [y,m]=ds.split('-').map(Number), entries=getMonthEntries(y,m);
      let e=entries.find(x=>x.date===ds);
      if(e){e.slots.push({start,end});if(memo)e.memo=memo;} else entries.push({date:ds,slots:[{start,end}],memo});
      setMonthEntries(y,m,entries);
      if(y!==curY||m!==curM){curY=y;curM=m;} hideModal(); render();
    }
    function addSlotToDate(ds){
      const start=getTime('start'),end=getTime('end'),memo=document.getElementById('inputMemo').value.trim();
      if(!start||!end){alert('開始時刻と終了時刻を入力してください。');return;}
      const [y,m]=ds.split('-').map(Number), entries=getMonthEntries(y,m);
      let e=entries.find(x=>x.date===ds);
      if(e){e.slots.push({start,end});e.memo=memo;} else entries.push({date:ds,slots:[{start,end}],memo});
      setMonthEntries(y,m,entries); hideModal(); render();
    }
    function deleteSlot(ds,idx){
      if(!confirm('この時間帯を削除しますか？'))return;
      const [y,m]=ds.split('-').map(Number), entries=getMonthEntries(y,m), e=entries.find(x=>x.date===ds);
      if(!e)return; e.slots.splice(idx,1);
      if(e.slots.length===0) entries.splice(entries.indexOf(e),1);
      setMonthEntries(y,m,entries); hideModal(); render();
    }
    function deleteDate(ds){
      if(!confirm('この日の記録を全て削除しますか？'))return;
      const [y,m]=ds.split('-').map(Number), entries=getMonthEntries(y,m);
      const i=entries.findIndex(x=>x.date===ds); if(i>=0) entries.splice(i,1);
      setMonthEntries(y,m,entries); hideModal(); render();
    }

    // ---- Bulk Input ----
    function openBulkModal(){
      const bulk=getBulk(curY,curM);
      document.getElementById('modalContent').innerHTML=`
        <h2>${curY}年${curM}月 一括入力</h2>
        <div style="font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.8;">
          <p>日別の勤務時間を入力できなかった月のために、<br>この月の合計勤務時間をまとめて入力できます。</p>
          <p style="margin-top:8px;">一括入力した時間は、日別の勤務時間の合計より<br><strong style="color:var(--accent4);">優先して反映</strong>されます。</p>
          <p style="margin-top:8px;">一括入力はいつでも削除して、<br>日別の合計に戻すことができます。</p>
        </div>
        <div class="form-group"><label>合計勤務時間（時間単位・小数OK）</label>
          <input type="number" id="bulkHours" step="0.5" min="0" placeholder="例: 160.5" value="${bulk!==null?bulk:''}" style="width:100%;font-size:20px;text-align:center;">
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="hideModal()">キャンセル</button>
          <button class="btn-save" onclick="saveBulkInput()">保存</button>
        </div>
        ${bulk!==null?'<button class="btn-delete-full" onclick="deleteBulkInput()">一括入力を削除（日別に戻す）</button>':''}`;
      showModal();
    }
    function saveBulkInput(){
      const v=document.getElementById('bulkHours').value;
      if(v===''||isNaN(parseFloat(v))){alert('時間を入力してください。');return;}
      setBulk(curY,curM,parseFloat(v));
      hideModal(); render();
    }
    function deleteBulkInput(){
      if(!confirm('一括入力を削除して日別の合計に戻しますか？'))return;
      setBulk(curY,curM,null);
      hideModal(); render();
    }

    // ---- Rate Page ----
    function renderRatePage(){
      document.getElementById('rateYearLabel').textContent=`${rateY}年`;
      const incomes=loadIncomes();

      let incHtml='';
      for(let m=1;m<=12;m++){
        const key=`${rateY}-${String(m).padStart(2,'0')}`;
        const val=incomes[key]||'';
        incHtml+=`<div class="income-row">
          <label>${m}月</label>
          <input type="number" inputmode="numeric" placeholder="0" value="${val}" onchange="saveMonthIncome('${key}',this.value)">
          <span class="unit">円</span>
        </div>`;
      }
      document.getElementById('monthlyIncomeInputs').innerHTML=incHtml;

      let annualIncome=0;
      for(let m=1;m<=12;m++){
        const key=`${rateY}-${String(m).padStart(2,'0')}`;
        annualIncome+=parseInt(incomes[key])||0;
      }
      document.getElementById('annualIncomeTotal').textContent='¥'+annualIncome.toLocaleString();

      let yt=0,ywd=0,yrd=0,rows='';
      for(let m=1;m<=12;m++){
        const dim=daysIn(rateY,m);
        const mm=getMonthTotalMin(rateY,m);
        const mwd=getMonthWorkDays(rateY,m);
        const mrd=dim-mwd, avg=mwd>0?Math.round(mm/mwd):0;
        yt+=mm; ywd+=mwd; yrd+=mrd;
        const has=mm>0;
        const mKey=`${rateY}-${String(m).padStart(2,'0')}`;
        const mInc=parseInt(incomes[mKey])||0;
        rows+=`<tr style="color:${has?'var(--text1)':'var(--text3)'}">
          <td>${m}月</td><td class="num">${has?fmtHM(mm):'--'}</td>
          <td class="num">${has?mwd+'日':'--'}</td><td class="num">${has?fmtMin(avg):'--'}</td>
          <td class="num" style="color:${mInc?'#8BAEFF':'inherit'}">${mInc?'¥'+mInc.toLocaleString():'--'}</td>
        </tr>`;
      }
      const yavg=ywd>0?Math.round(yt/ywd):0;
      rows+=`<tr><td>合計</td><td class="num">${fmtHM(yt)}</td><td class="num">${ywd}日</td><td class="num">${fmtMin(yavg)}</td><td class="num" style="color:#8BAEFF;">¥${annualIncome.toLocaleString()}</td></tr>`;
      document.getElementById('yearSummaryTable').innerHTML=`<table class="year-table"><thead><tr><th>月</th><th class="num">時間</th><th class="num">日数</th><th class="num">平均</th><th class="num">月収</th></tr></thead><tbody>${rows}</tbody></table>`;

      const yh=yt/60, rate=yh>0?Math.round(annualIncome/yh):0;
      document.getElementById('rateResult').innerHTML=`
        <div class="rate-label">年間勤務 ${Math.round(yh)}時間</div>
        <div class="rate-value">${rate>0?'¥'+rate.toLocaleString():'--'}</div>
        <div class="rate-label" style="margin-top:4px;">1時間あたり</div>`;
    }
    function changeRateYear(d){rateY+=d;renderRatePage();}
    function saveMonthIncome(key,val){
      const inc=loadIncomes(); inc[key]=val; saveIncomes(inc);
      renderRatePage();
    }

    // ---- Settings ----
    function exportData(){
      const blob=new Blob([JSON.stringify({workHours:loadData(),monthlyIncomes:loadIncomes(),monthlyBulkHours:loadBulk()},null,2)],{type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
      a.download=`work-hours-${new Date().toISOString().slice(0,10)}.json`; a.click();
    }
    function importData(ev){
      const f=ev.target.files[0]; if(!f) return;
      const r=new FileReader();
      r.onload=function(e){
        try{
          const d=JSON.parse(e.target.result);
          if(d.workHours) saveData(d.workHours);
          if(d.monthlyIncomes) saveIncomes(d.monthlyIncomes);
          if(d.monthlyBulkHours) saveBulk(d.monthlyBulkHours);
          if(d.annualIncome){const inc=loadIncomes();inc.legacy=d.annualIncome;saveIncomes(inc);}
          alert('インポートが完了しました。'); render();
        }catch{alert('ファイルの読み込みに失敗しました。');}
      };
      r.readAsText(f); ev.target.value='';
    }
    function clearAllData(){
      if(!confirm('全てのデータを削除しますか？'))return;
      if(!confirm('本当に削除しますか？'))return;
      localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(INCOME_KEY);
      render(); alert('全データを削除しました。');
    }

    render();
    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  </script>
</body>
</html>
